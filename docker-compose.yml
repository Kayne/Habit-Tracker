# ============================================================
# HabitTracker — konteneryzacja całego systemu.
# Uruchomienie: `docker compose up --build`
# ============================================================

services:

  # ---------- Baza danych ----------
  postgres:
    image: postgres:16-alpine
    container_name: ht-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Wystawiamy tylko lokalnie (tylko do debugu).
      # W prod: TEGO NIE ROBIMY — DB nie jest publiczna.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init.sql wykona się TYLKO raz przy pierwszym starcie (pusty wolumen)
      - ./db/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - backend

  # ---------- Serwis A: Auth ----------
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: ht-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AUTH_DB_SCHEMA: ${AUTH_DB_SCHEMA}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
    ports:
      - "${AUTH_SERVICE_PORT}:8001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  # ---------- Serwis B: Habits ----------
  habits-service:
    build:
      context: ./habits-service
      dockerfile: Dockerfile
    container_name: ht-habits
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      HABITS_DB_SCHEMA: ${HABITS_DB_SCHEMA}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
    ports:
      - "${HABITS_SERVICE_PORT}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - backend

volumes:
  postgres-data:
    driver: local

networks:
  backend:
    driver: bridge
